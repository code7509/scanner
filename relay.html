<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sending to printer...</title>
    <style>
        body {
  font-family: sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  background: #f0f4f8;
}
.box {
  text-align: center;
  background: white;
  padding: 30px 40px;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
}
p {
  color: #64748b;
  margin-top: 8px;
  font-size: 14px;
}
</style>
</head>

<body>
    <div class="box">
        <div style="font-size:36px">🖨️</div> <b id="title">Sending to printer...</b>
        <p id="msg">Please wait</p>
    </div>
    <script>
      const PRINTER_URL = 'https://yourname.github.io/scanner/';

try {
  const raw = new URLSearchParams(window.location.search).get('data');
  if (!raw) throw new Error('No data in URL');

  const printerTab = window.open(PRINTER_URL, 'printer');

  if (!printerTab) {
    throw new Error('Popup blocked or printer tab not available');
  }

  // Wait longer and retry properly
  let attempts = 0;

  const sendMessage = () => {
    try {
      printerTab.postMessage({
        type: 'PRINT_JOB',
        payload: JSON.parse(raw)
      }, '*');
    } catch (e) {}
  };

  const interval = setInterval(() => {
    attempts++;
    sendMessage();

    if (attempts >= 10) {
      clearInterval(interval);
    }
  }, 500); // ⬅️ slower & more reliable

  document.getElementById('title').textContent = '✅ Sent!';
  document.getElementById('msg').textContent = 'Printing now...';

  setTimeout(() => {
    window.close();
  }, 500);

} catch(e) {
  document.getElementById('title').textContent = '❌ Error';
  document.getElementById('msg').textContent = e.message;
}
    </script>
</body>

</html>

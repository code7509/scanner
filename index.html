<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jalaram Printer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    /* When inside iframe, make it compact */
    body.iframe-mode {
      padding: 10px;
      background: transparent;
    }

    h2 { color: #333; margin-bottom: 12px; font-size: 16px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      margin-bottom: 12px;
    }

    .status-box {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 500;
    }
    .status-box.idle    { background: #f1f5f9; color: #64748b; }
    .status-box.success { background: #dcfce7; color: #16a34a; }
    .status-box.error   { background: #fee2e2; color: #dc2626; }
    .status-box.loading { background: #dbeafe; color: #2563eb; }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #connectBtn { background: #2563eb; color: white; }
    #printBtn   { background: #16a34a; color: white; }
    #forgetBtn  { background: #e2e8f0; color: #475569; font-size: 12px; padding: 7px; }

    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #93c5fd;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #receiptPreview {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      background: #fff;
      padding: 12px;
      border: 1px dashed #ccc;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }
    #receiptPreview table { width: 100%; border-collapse: collapse; }
    #receiptPreview td, #receiptPreview th { padding: 2px 3px; }

    /* Hide receipt in iframe mode to save space */
    body.iframe-mode #receiptPreview { display: none; }
    body.iframe-mode h2 { display: none; }
  </style>
</head>
<body>

  <h2>🖨️ Jalaram Printer</h2>

  <div class="card">
    <div id="statusBox" class="status-box idle">Not connected</div>
    <button id="connectBtn" onclick="connectPrinter()">🔗 Connect Bluetooth Printer</button>
    <button id="printBtn" onclick="printCurrentReceipt()" disabled>🖨️ Print</button>
    <button id="forgetBtn" onclick="forgetPrinter()" style="display:none">🗑️ Forget Printer</button>
  </div>

  <div id="receiptPreview">Waiting for receipt...</div>

<script>
  let printChar    = null;
  let savedDevice  = null;
  let receiptData  = null;
  let pendingPrint = false; // queue print if data arrives before connect

  const PROFILES = [
    { service:'000018f0-0000-1000-8000-00805f9b34fb', characteristic:'00002af1-0000-1000-8000-00805f9b34fb' },
    { service:'e7810a71-73ae-499d-8c15-faa9aef0c3f2', characteristic:'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f' },
    { service:'49535343-fe7d-4ae5-8fa9-9fafd205e455', characteristic:'49535343-8841-43f4-a8d4-ecbe34729bb3' },
  ];

  // ── Detect if running inside iframe ─────────────────────────────────────────
  const isIframe = window.self !== window.top;
  if (isIframe) document.body.classList.add('iframe-mode');

  // ── Status ───────────────────────────────────────────────────────────────────
  function setStatus(msg, type='idle', spinner=false) {
    const b = document.getElementById('statusBox');
    b.className = 'status-box ' + type;
    b.innerHTML = (spinner ? '<span class="spinner"></span>' : '') + msg;
    // Also notify parent (Apps Script) of status
    if (isIframe) {
      window.parent.postMessage({ type: 'PRINTER_STATUS', status: type, msg }, '*');
    }
  }

  // ── Listen for print jobs from parent (Apps Script iframe) ───────────────────
  window.addEventListener('message', async (event) => {
    if (!event.data) return;

    if (event.data.type === 'PRINT_JOB') {
      receiptData  = event.data.payload;
      pendingPrint = true;
      renderPreview(receiptData);

      if (printChar) {
        // ✅ Already connected — print immediately!
        await printCurrentReceipt();
      } else {
        setStatus('📋 Receipt ready. Connect printer.', 'idle');
      }
    }

    if (event.data.type === 'PING') {
      // Parent checking if iframe is alive
      window.parent.postMessage({ type: 'PONG', connected: !!printChar }, '*');
    }
  });

  // ── On load ──────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    // Check URL data (standalone tab mode)
    const raw = new URLSearchParams(window.location.search).get('data');
    if (raw && !isIframe) {
      try {
        receiptData  = JSON.parse(decodeURIComponent(raw));
        pendingPrint = true;
        renderPreview(receiptData);
        setStatus('Connect printer to print', 'idle');
      } catch(e) {}
    }

    // Notify parent we are ready
    if (isIframe) {
      window.parent.postMessage({ type: 'PRINTER_READY' }, '*');
    }
  });

  // ── Connect (manual — required first time by browser) ────────────────────────
  async function connectPrinter() {
    try {
      setStatus('Scanning...', 'loading', true);
      document.getElementById('connectBtn').disabled = true;

      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: PROFILES.map(p => p.service)
      });

      setStatus('Connecting...', 'loading', true);
      savedDevice = device;
      device.addEventListener('gattserverdisconnected', onDisconnected);

      const ok = await connectToDevice(device);
      if (ok) {
        setStatus('✅ Connected: ' + (device.name || 'Printer'), 'success');
        document.getElementById('printBtn').disabled   = false;
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('forgetBtn').style.display = 'block';

        // Print if job was waiting
        if (pendingPrint && receiptData) await printCurrentReceipt();
      } else {
        setStatus('❌ UUID not matched. Try again.', 'error');
        document.getElementById('connectBtn').disabled = false;
      }
    } catch(e) {
      setStatus('❌ ' + e.message, 'error');
      document.getElementById('connectBtn').disabled = false;
    }
  }

  // ── Connect to gatt ──────────────────────────────────────────────────────────
  async function connectToDevice(device) {
    try {
      const server = await device.gatt.connect();
      for (const p of PROFILES) {
        try {
          const svc = await server.getPrimaryService(p.service);
          printChar  = await svc.getCharacteristic(p.characteristic);
          return true;
        } catch(e) {}
      }
    } catch(e) {}
    return false;
  }

  // ── Auto reconnect on disconnect ─────────────────────────────────────────────
  async function onDisconnected() {
    printChar = null;
    document.getElementById('printBtn').disabled = true;
    setStatus('Disconnected. Reconnecting...', 'loading', true);

    for (let i = 0; i < 10; i++) {
      await new Promise(r => setTimeout(r, 1500));
      if (!savedDevice) break;
      const ok = await connectToDevice(savedDevice);
      if (ok) {
        setStatus('✅ Reconnected: ' + (savedDevice.name || 'Printer'), 'success');
        document.getElementById('printBtn').disabled = false;
        return;
      }
    }
    setStatus('⚠️ Printer OFF or out of range.', 'error');
    document.getElementById('connectBtn').disabled = false;
  }

  // ── Forget printer ───────────────────────────────────────────────────────────
  function forgetPrinter() {
    if (savedDevice) try { savedDevice.gatt.disconnect(); } catch(e) {}
    printChar = savedDevice = null;
    document.getElementById('printBtn').disabled = true;
    document.getElementById('forgetBtn').style.display = 'none';
    setStatus('Forgotten. Connect again.', 'idle');
  }

  // ── Render receipt preview ───────────────────────────────────────────────────
  function renderPreview(data) {
    const { header, items } = data;
    let total = 0, rows = '';
    items.forEach((item, i) => {
      const t = item.qty * item.price; total += t;
      rows += `<tr>
        <td>${i+1}.</td><td>${item.name}</td>
        <td>${item.qty}x</td>
        <td align="center">${item.price}</td>
        <td align="right"><b>${t}</b></td>
      </tr>`;
    });
    document.getElementById('receiptPreview').innerHTML = `
      <div style="text-align:center">
        <b style="font-size:13px">Jalaram Super Store</b><br>
        Barwala(G)<br>9725792370<br>----------------------------
      </div>
      Bill : ${header.billNo}<br>Date : ${header.date}
      <hr style="margin:2px 0">
      Customer : ${header.customerName}<br>
      Mobile   : ${header.mobile}<br>
      Payment  : ${header.paymentMethod}
      <hr style="margin:2px 0">
      <table>
        <tr><th>#</th><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr>
        ${rows}
      </table>
      <hr style="margin:2px 0">
      <div style="text-align:right"><b>Total ₹ ${total}</b></div>
      <hr style="margin:2px 0">
      <div style="text-align:center">Thank You Visit Again</div>`;
  }

  // ── Print ────────────────────────────────────────────────────────────────────
  async function printCurrentReceipt() {
    if (!printChar || !receiptData) return;
    pendingPrint = false;
    setStatus('Printing...', 'loading', true);
    try {
      await sendChunks(buildEscPos(receiptData));
      setStatus('✅ Printed! Ready for next.', 'success');
    } catch(e) {
      setStatus('❌ ' + e.message, 'error');
    }
  }

  function buildEscPos(data) {
    const { header, items } = data;
    let total = 0;
    const LF='\n', INIT='\x1B\x40', CENTER='\x1B\x61\x01',
          LEFT='\x1B\x61\x00', RIGHT='\x1B\x61\x02',
          BON='\x1B\x45\x01', BOFF='\x1B\x45\x00',
          CUT='\x1D\x56\x41\x05', LINE='--------------------------------\n';

    let t = INIT + CENTER + BON + 'Jalaram Super Store' + BOFF + LF;
    t += 'Barwala(G)' + LF + '9725792370' + LF + LINE;
    t += LEFT + 'Bill No : ' + header.billNo + LF;
    t += 'Date    : ' + header.date + LF + LINE;
    t += 'Customer: ' + header.customerName + LF;
    t += 'Mobile  : ' + header.mobile + LF;
    t += 'Payment : ' + header.paymentMethod + LF + LINE;
    t += '#  Item               Qty  Rate   Total' + LF + LINE;

    items.forEach((item, i) => {
      const it = item.qty * item.price; total += it;
      t += String(i+1).padStart(2) + ' ' +
           item.name.substring(0,15).padEnd(15) +
           String(item.qty).padStart(4) + ' ' +
           String(item.price).padStart(5) + ' ' +
           String(it).padStart(7) + LF;
    });

    t += LINE + RIGHT + BON + 'Total: Rs.' + total + '   ' + BOFF + LF;
    t += LINE + CENTER + 'Thank You! Visit Again' + LF;
    t += LF + LF + LF + CUT;
    return new TextEncoder().encode(t);
  }

  async function sendChunks(data) {
    for (let i = 0; i < data.length; i += 100) {
      await printChar.writeValue(data.slice(i, i+100));
      await new Promise(r => setTimeout(r, 50));
    }
  }
</script>
</body>
</html>

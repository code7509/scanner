<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jalaram Printer 🖨️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }
    h2 { color: #333; margin-bottom: 12px; font-size: 17px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      margin-bottom: 12px;
    }
    .status-box {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 500;
    }
    .status-box.idle    { background: #f1f5f9; color: #64748b; }
    .status-box.success { background: #dcfce7; color: #16a34a; }
    .status-box.error   { background: #fee2e2; color: #dc2626; }
    .status-box.loading { background: #dbeafe; color: #2563eb; }
    .status-box.pending { background: #fef9c3; color: #854d0e; }
    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #connectBtn { background: #2563eb; color: white; }
    #printPendingBtn { background: #f59e0b; color: white; display: none; }
    #forgetBtn  { background: #e2e8f0; color: #475569; font-size:12px; padding:7px; display:none; }
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #93c5fd;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #receiptPreview {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      background: #fff;
      padding: 12px;
      border: 1px dashed #ccc;
      border-radius: 8px;
      width: 100%;
      max-width: 380px;
    }
    #receiptPreview table { width: 100%; border-collapse: collapse; }
    #receiptPreview td, #receiptPreview th { padding: 2px 3px; }
    .hint { font-size:12px; color:#94a3b8; text-align:center; margin-top:10px; }
    #ping-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <h2>🖨️ Jalaram Printer <span id="ping-dot" title="Connection alive"></span></h2>

  <div class="card">
    <div id="statusBox" class="status-box idle">Not connected</div>
    <button id="connectBtn" onclick="connectPrinter()">🔗 Connect Bluetooth Printer</button>
    <button id="printPendingBtn" onclick="printPendingNow()">🖨️ Print Pending Bill</button>
    <button id="forgetBtn" onclick="forgetPrinter()">🗑️ Forget &amp; Disconnect</button>
  </div>

  <div id="receiptPreview">Waiting for receipt from billing app...</div>
  <p class="hint">⚠️ Keep this tab open while billing</p>

<script>
  let receiptData = null;

  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (raw) {
      receiptData = JSON.parse(decodeURIComponent(raw));
      renderPreview(receiptData);
    } else {
      // Demo data if no URL params (for testing)
      receiptData = {
        header: {
          billNo: "001",
          date: new Date().toLocaleDateString('en-IN'),
          customerName: "Test Customer",
          mobile: "9999999999",
          paymentMethod: "Cash"
        },
        items: [
          { name: "Sugar 1kg", qty: 2, price: 45 },
          { name: "Rice 5kg",  qty: 1, price: 280 }
        ]
      };
      renderPreview(receiptData);
    }
  } catch(e) {
    document.getElementById('receiptPreview').textContent = 'Error loading data: ' + e.message;
  }

  function renderPreview(data) {
    const { header, items } = data;
    let total = 0;
    let rows = '';

    items.forEach((item, i) => {
      const itemTotal = item.qty * item.price;
      total += itemTotal;
      rows += `<tr>
        <td>${i+1}.</td>
        <td>${item.name}</td>
        <td>${item.qty} x</td>
        <td align="center">${item.price}</td>
        <td align="right"><b>${itemTotal}</b></td>
      </tr>`;
    });

    document.getElementById('receiptPreview').innerHTML = `
      <div style="text-align:center">
        <b style="font-size:14px">Jalaram Super Store</b><br>
        Barwala(G)<br>9725792370<br>
        ----------------------------
      </div>
      Bill : ${header.billNo}<br>
      Date : ${header.date}<hr style="margin:2px 0">
      Customer : ${header.customerName}<br>
      Mobile   : ${header.mobile}<br>
      Payment  : ${header.paymentMethod}
      <hr style="margin:2px 0">
      <table>
        <tr><th>#</th><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr>
        ${rows}
      </table>
      <hr style="margin:2px 0">
      <div style="text-align:right"><b>Total ₹ ${total}</b></div>
      <hr style="margin:2px 0">
      <div style="text-align:center">Thank You Visit Again</div>
    `;
  }

  // ─── Bluetooth ──────────────────────────────────────────────────────────────
  let printChar = null;

  const PROFILES = [
    { service: '000018f0-0000-1000-8000-00805f9b34fb', characteristic: '00002af1-0000-1000-8000-00805f9b34fb', name: 'A' },
    { service: 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', characteristic: 'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f', name: 'B' },
    { service: '49535343-fe7d-4ae5-8fa9-9fafd205e455', characteristic: '49535343-8841-43f4-a8d4-ecbe34729bb3', name: 'C' },
  ];

  function setStatus(msg, type = 'idle') {
    const box = document.getElementById('statusBox');
    box.textContent = msg;
    box.className = 'status-box ' + type;
  }

  async function connectPrinter() {
    try {
      setStatus('Scanning for printer...', 'loading');
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: PROFILES.map(p => p.service)
      });

      setStatus('Connecting...', 'loading');
      const server = await device.gatt.connect();

      for (const profile of PROFILES) {
        try {
          const svc  = await server.getPrimaryService(profile.service);
          printChar  = await svc.getCharacteristic(profile.characteristic);
          setStatus(`✅ Connected: ${device.name}`, 'success');
          document.getElementById('printBtn').disabled = false;
          return;
        } catch(e) { /* try next */ }
      }

      setStatus('❌ Printer found but UUID not matched. Contact support.', 'error');
    } catch(e) {
      setStatus('❌ ' + e.message, 'error');
    }
  }

  async function printReceipt() {
    if (!printChar || !receiptData) return;

    setStatus('Printing...', 'loading');
    try {
      const esc = buildEscPos(receiptData);
      await sendChunks(esc);
      setStatus('✅ Printed successfully!', 'success');
    } catch(e) {
      setStatus('❌ Print failed: ' + e.message, 'error');
    }
  }
function centerText(text, width) {
  text = String(text);
  if (text.length >= width) return text;

  const left = Math.floor((width - text.length) / 2);
  const right = width - text.length - left;

  return ' '.repeat(left) + text + ' '.repeat(right);
}
  function buildEscPos(data) {
    const { header, items } = data;
    let total = 0;
    const LF='\n', INIT='\x1B\x40', CENTER='\x1B\x61\x01',
          LEFT='\x1B\x61\x00', RIGHT='\x1B\x61\x02',
          BON='\x1B\x45\x01', BOFF='\x1B\x45\x00',
          CUT='\x1D\x56\x41\x05', LINE='--------------------------------\n';

    let t = INIT + CENTER + BON + 'Jalaram Super Store' + BOFF + LF;
    t += 'Barwala(G)' + LF + '9725792370' + LF + LINE;
    t += LEFT + 'Bill No : ' + header.billNo + LF;
    t += 'Date    : ' + header.date + LF + LINE;
    t += 'Customer: ' + header.customerName + LF;
    t += 'Mobile  : ' + header.mobile + LF;
    t += 'Payment : ' + header.paymentMethod + LF + LINE;
    const colIndexWidth = 2;
    const colItemWidth  = 16;
    const colQtyWidth   = 3;
    const colRateWidth  = 5;
    const colTotalWidth = 6;
    const hIndex = '#'.padEnd(colIndexWidth);
    const hItem  = 'Item'.padEnd(colItemWidth);
    const hQty   = centerText('Qty', colQtyWidth);
    const hRate  = 'Rate'.padStart(colRateWidth);
    const hTotal = 'Total'.padStart(colTotalWidth);
    
    t += hIndex + hItem + hQty + hRate + hTotal + '\n';
    
items.forEach((item, i) => {
  const it = item.qty * item.price;
  total += it;

  const fullName = item.name;

  const line1Name = fullName.substring(0, 16).padEnd(16);
  const line2Name = fullName.substring(16); // remaining text

  const qty  = centerText(item.qty, colQtyWidth); 
   const rateValue = Number(item.price).toString();   // 👈 fix
  const rate  = rateValue.padStart(colRateWidth);
  const tot  = String(it).padStart(colTotalWidth);

  // First line (with all columns)
  const index = (i+1 < 16) ? (i+1 + ' ') : (i+1);

t += index + line1Name + qty + rate + tot + '\n';

  // Second line (only if extra name exists)
  if (line2Name) {
    t += `   ${line2Name}\n`; // indent for alignment
  }
});
    
   const totalText = 'Total: Rs.' + total;
    t += LINE;
    t += totalText.padStart(32) + '\n';
    t += LINE + CENTER + 'Thank You! Visit Again' + LF;
    t += LF + LF + LF + CUT;
    return new TextEncoder().encode(t);
  }

  async function sendChunks(data) {
    for (let i = 0; i < data.length; i += 100) {
      await printChar.writeValue(data.slice(i, i+100));
      await new Promise(r => setTimeout(r, 50));
    }
  }
</script>
</body>
</html>

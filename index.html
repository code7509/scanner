<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jalaram Printer 🖨️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }
    h2 { color: #333; margin-bottom: 12px; font-size: 17px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      margin-bottom: 12px;
    }
    .status-box {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 500;
    }
    .status-box.idle    { background: #f1f5f9; color: #64748b; }
    .status-box.success { background: #dcfce7; color: #16a34a; }
    .status-box.error   { background: #fee2e2; color: #dc2626; }
    .status-box.loading { background: #dbeafe; color: #2563eb; }
    .status-box.pending { background: #fef9c3; color: #854d0e; }
    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #connectBtn { background: #2563eb; color: white; }
    #printPendingBtn { background: #f59e0b; color: white; display: none; }
    #forgetBtn  { background: #e2e8f0; color: #475569; font-size:12px; padding:7px; display:none; }
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #93c5fd;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #receiptPreview {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      background: #fff;
      padding: 12px;
      border: 1px dashed #ccc;
      border-radius: 8px;
      width: 100%;
      max-width: 380px;
    }
    #receiptPreview table { width: 100%; border-collapse: collapse; }
    #receiptPreview td, #receiptPreview th { padding: 2px 3px; }
    .hint { font-size:12px; color:#94a3b8; text-align:center; margin-top:10px; }
    #ping-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <h2>🖨️ Jalaram Printer <span id="ping-dot" title="Connection alive"></span></h2>

  <div class="card">
    <div id="statusBox" class="status-box idle">Not connected</div>
    <button id="connectBtn" onclick="connectPrinter()">🔗 Connect Bluetooth Printer</button>
    <button id="printPendingBtn" onclick="printPendingNow()">🖨️ Print Pending Bill</button>
    <button id="forgetBtn" onclick="forgetPrinter()">🗑️ Forget &amp; Disconnect</button>
  </div>

  <div id="receiptPreview">Waiting for receipt from billing app...</div>
  <p class="hint">⚠️ Keep this tab open while billing</p>

<script>
  let printChar   = null;
  let savedDevice = null;
  let pendingJob  = null;
  let lastJobId   = null; // prevent duplicate print
  let keepAliveTimer = null;
  let isPrinting     = false;
  let isReconnecting = false;
  let userConnected  = false; 
  
  const STORAGE_KEY = 'jalaram_print_job';
  const PING_CMD = new Uint8Array([0x10]);
  const PROFILES = [
    { service:'000018f0-0000-1000-8000-00805f9b34fb', characteristic:'00002af1-0000-1000-8000-00805f9b34fb' },
    { service:'e7810a71-73ae-499d-8c15-faa9aef0c3f2', characteristic:'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f' },
    { service:'49535343-fe7d-4ae5-8fa9-9fafd205e455', characteristic:'49535343-8841-43f4-a8d4-ecbe34729bb3' },
  ];

  // ── Status ───────────────────────────────────────────────────────────────────
  function setStatus(msg, type='idle', spinner=false) {
    const b = document.getElementById('statusBox');
    b.className = 'status-box ' + type;
    b.innerHTML = (spinner ? '<span class="spinner"></span>' : '') + msg;
  }
  function setPendingBtnVisible(visible) {
    document.getElementById('printPendingBtn').style.display = visible ? 'block' : 'none';
  }
    function makeJobId(job) {
    return (job?.header?.billNo||'') + '|' + (job?.header?.date||'') + '|' + (job?.items?.length||0);
  }

  function isConnected() {
    return printChar !== null && savedDevice?.gatt?.connected === true;
  }

  function flashDot() {
    const dot = document.getElementById('ping-dot');
    dot.style.opacity = '1';
    setTimeout(() => dot.style.opacity = '0', 400);
  }
// ── Keepalive ping — sends empty read every 3s to keep BLE alive ─────────────
  // Android Chrome drops BLE if no activity for ~5s when tab is in background
  function startKeepAlive() {
    stopKeepAlive();
    keepAliveTimer = setInterval(async () => {
      // Don't ping while printing — avoid interference
      if (isPrinting || !userConnected) return;
      if (!savedDevice?.gatt?.connected) {
        // GATT says disconnected — trigger reconnect
        silentReconnect();
        return;
      }
      try {
        await printChar.writeValueWithoutResponse(PING_CMD);
        // Flash green dot
        flashDot();
      } catch(e) {
        // Write failed — connection dropped
        console.warn('Keepalive write failed:', e.message);
        silentReconnect();
      }
    }, 3000);
  }

  function stopKeepAlive() {
    if (keepAliveTimer) { clearInterval(keepAliveTimer); keepAliveTimer = null; }
  }
 // ── Silent background reconnect ───────────────────────────────────────────────
  // User NEVER sees "Disconnected / Reconnecting" — we fix it invisibly.
  // Only after ALL retries fail do we tell the user.
  async function silentReconnect() {
    if (isReconnecting || !savedDevice || !userConnected) return;
    isReconnecting = true;
    printChar = null;
    stopKeepAlive();

    // Keep showing the green "Connected" status during background repair
    // so the screen doesn't alarm the user

    let ok = false;
    for (let i = 0; i < 15; i++) {
      await new Promise(r => setTimeout(r, i === 0 ? 800 : 2000));
      if (!savedDevice) break;
      ok = await connectToDevice(savedDevice);
      if (ok) break;
    }

    isReconnecting = false;

    if (ok) {
      startKeepAlive();
      // Quietly restore status — user sees "Ready" as if nothing happened
      setStatus('✅ Connected: ' + (savedDevice.name || 'Printer') + ' — Ready!', 'success');
      if (pendingJob) {
        const job = pendingJob; pendingJob = null;
        setPendingBtnVisible(false);
        await printJob(job);
      }
    } else {
      // Printer is genuinely unreachable — now tell the user
      setStatus('⚠️ Printer out of range. Move closer & tap Connect.', 'error');
      if (pendingJob) setPendingBtnVisible(true);
    }
  }

  // ── GATT disconnect event → trigger silent reconnect, never show "Disconnected" ─
  function onDisconnected() {
    if (!userConnected) return;
    printChar = null;
    silentReconnect(); // invisible repair
  }
  // ── Deduplicated job handler ─────────────────────────────────────────────────
  async function handlePrintJob(job) {
    const jobId = makeJobId(job);
    if (jobId === lastJobId) return;
    lastJobId = jobId;

    localStorage.removeItem(STORAGE_KEY);
    renderPreview(job);

     if (isConnected()) {
       setPendingBtnVisible(false);
        await printJob(job);
      } else {
        // Save as pending and try to reconnect
        if (userConnected && savedDevice) {
        // Background reconnect is already running (or we trigger it)
        // The job will auto-print once reconnected
        if (!isReconnecting) silentReconnect();
        // Keep status as-is (likely still "Connected") so user isn't alarmed
      } else {
        setStatus('📋 Bill ready. Connect printer then tap Print.', 'pending');
        setPendingBtnVisible(true);
      }
    }
  }
 async function printPendingNow() {
    if (!pendingJob) { setStatus('No pending bill.', 'idle'); setPendingBtnVisible(false); return; }
    if (!isConnected()) { setStatus('❌ Not connected. Connect first.', 'error'); return; }
    const job = pendingJob; pendingJob = null;
    setPendingBtnVisible(false);
    await printJob(job);
  }
   // 1. BroadcastChannel (same origin, instant)
  try {
    const bc = new BroadcastChannel('jalaram_print');
    bc.onmessage = async (e) => {
      if (e.data?.type === 'PRINT_JOB' && e.data?.payload) await handlePrintJob(e.data.payload);
    };
  } catch(e) {}
  // ── 2. postMessage from relay tab
  window.addEventListener('message', async (e) => {
    if (e.data?.type === 'PRINT_JOB' && e.data?.payload) {
      await handlePrintJob(e.data.payload);
    }
  });

  // ── Method 3: localStorage storage event ────────────────────────────────────
  window.addEventListener('storage', async (e) => {
    if (e.key === STORAGE_KEY && e.newValue) {
      try { await handlePrintJob(JSON.parse(e.newValue)); } catch(err) {}
    }
  });

  // ── Method 3: Polling every 800ms (most reliable on Android) ────────────────
  setInterval(async () => {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try { await handlePrintJob(JSON.parse(raw)); } catch(e) {}
  }, 800);
// 5. On tab focus — immediately check connection, reconnect if needed
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && userConnected) {
      if (!isConnected() && !isReconnecting) silentReconnect();
    }
  });
  // ── On page load ─────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    const raw = new URLSearchParams(window.location.search).get('data');
    if (raw) {
      try {
        const job = JSON.parse(decodeURIComponent(raw));
        renderPreview(job);
        pendingJob = job;
        lastJobId = makeJobId(job);
        setStatus('📋 Bill ready. Connect printer then tap Print.', 'pending');
        setPendingBtnVisible(true);
        history.replaceState(null, '', window.location.pathname);
      } catch(e) {}
    }
    // Clear stale job
    localStorage.removeItem(STORAGE_KEY);
    // lastJobId = null;
  });

  // ── Connect Bluetooth ─────────────────────────────────────────────────────────
async function connectPrinter() {
    try {
      setStatus('Scanning...', 'loading', true);
      document.getElementById('connectBtn').disabled = true;

      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: PROFILES.map(p => p.service)
      });

      setStatus('Connecting...', 'loading', true);
      savedDevice = device;
      device.addEventListener('gattserverdisconnected', onDisconnected);

      const ok = await connectToDevice(device);
      if (ok) {
        userConnected = true;
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('forgetBtn').style.display = 'block';
        startKeepAlive();

        // If there's a pending job, print it immediately
        if (pendingJob) {
          setStatus('✅ Connected: ' + (device.name || 'Printer') + ' — Printing now...', 'success');
          setPendingBtnVisible(false);
          const job = pendingJob;
          pendingJob = null;
          await printJob(job);
        } else {
          setStatus('✅ Connected: ' + (device.name || 'Printer') + ' — Ready!', 'success');
        }
      } else {
        setStatus('❌ UUID not matched. Try again.', 'error');
        document.getElementById('connectBtn').disabled = false;
      }
    } catch(e) {
      setStatus('❌ ' + e.message, 'error');
      document.getElementById('connectBtn').disabled = false;
    }
  }

  async function connectToDevice(device) {
    try {
      const server = await device.gatt.connect();
      for (const p of PROFILES) {
        try {
          const svc = await server.getPrimaryService(p.service);
          printChar  = await svc.getCharacteristic(p.characteristic);
          return true;
        } catch(e) {}
      }
    } catch(e) { console.warn('connectToDevice error:', e.message); }
     printChar = null;
    return false;
  }

  // async function onDisconnected() {
  //   if (isReconnecting) return;
  //   isReconnecting = true;
  //   printChar = null;
  //   stopKeepAlive();
  //   setStatus('Disconnected. Reconnecting...', 'loading', true);
  //   for (let i = 0; i < 10; i++) {
  //     await new Promise(r => setTimeout(r, 2000));
  //     if (!savedDevice) break;
  //     const ok = await connectToDevice(savedDevice);
  //     if (ok) {
  //       isReconnecting = false;
  //       setStatus('✅ Reconnected: ' + (savedDevice.name || 'Printer'), 'success');
  //       startKeepAlive(); // ✅ restart keepalive after reconnect
  //       // Print pending job if any arrived during disconnect
  //       if (pendingJob) { 
  //         await printJob(pendingJob); pendingJob = null;
  //        setPendingBtnVisible(false);
  //         await printJob(job);
  //       }
  //       return;
  //     }
  //   }
  //   isReconnecting = false;
  //   setStatus('⚠️ Printer OFF or out of range. Tap Connect.', 'error');
  //   document.getElementById('connectBtn').disabled = false;
  //   if (pendingJob) setPendingBtnVisible(true);
  // }

  function forgetPrinter() {
    stopKeepAlive();
    if (savedDevice) try { savedDevice.gatt.disconnect(); } catch(e) {}
    printChar = savedDevice = null;
    document.getElementById('forgetBtn').style.display = 'none';
    setStatus('Forgotten. Connect again.', 'idle');
  }

  // ── Render preview ────────────────────────────────────────────────────────────
  function renderPreview(data) {
    if (!data?.header || !data?.items) return;
    const { header, items } = data;
    let total = 0, rows = '';
    items.forEach((item, i) => {
      const t = item.qty * item.price; total += t;
      rows += `<tr>
        <td>${i+1}.</td><td>${item.name}</td>
        <td>${item.qty}x</td>
        <td align="center">${item.price}</td>
        <td align="right"><b>${t}</b></td></tr>`;
    });
    document.getElementById('receiptPreview').innerHTML = `
      <div style="text-align:center">
        <b style="font-size:13px">Jalaram Super Store</b><br>
        Barwala(G)<br>9725792370<br>----------------------------
      </div>
      Bill : ${header.billNo}<br>Date : ${header.date}
      <hr style="margin:2px 0">
      Customer : ${header.customerName}<br>
      Mobile   : ${header.mobile}<br>
      Payment  : ${header.paymentMethod}
      <hr style="margin:2px 0">
      <table><tr><th>#</th><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr>${rows}</table>
      <hr style="margin:2px 0">
      <div style="text-align:right"><b>Total ₹ ${total}</b></div>
      <hr style="margin:2px 0">
      <div style="text-align:center">Thank You Visit Again</div>`;
  }

  // ── Print ─────────────────────────────────────────────────────────────────────
   async function printJob(data) {
      if (!printChar || isPrinting) return;
      isPrinting = true;
      setStatus('Printing...', 'loading', true);
      try {
        await sendChunks(buildEscPos(data));
        setStatus('✅ Printed! Ready for next bill.', 'success');
      } catch(e) {
        setStatus('❌ Print failed: ' + e.message, 'error');
        // Store as pending so reconnect can retry
        setPendingBtnVisible(true);
      silentReconnect();
    } finally {
      isPrinting = false;
    }
    }
function centerText(text, width) {
  text = String(text);
  if (text.length >= width) return text;

  const left = Math.floor((width - text.length) / 2);
  const right = width - text.length - left;

  return ' '.repeat(left) + text + ' '.repeat(right);
}
  function buildEscPos(data) {
    const { header, items } = data;
    let total = 0;
    const LF='\n', INIT='\x1B\x40', CENTER='\x1B\x61\x01',
          LEFT='\x1B\x61\x00', RIGHT='\x1B\x61\x02',
          BON='\x1B\x45\x01', BOFF='\x1B\x45\x00',
          CUT='\x1D\x56\x41\x05', LINE='--------------------------------\n';

    let t = INIT + CENTER + BON + 'Jalaram Super Store' + BOFF + LF;
    t += 'Barwala(G)' + LF + '9725792370' + LF + LINE;
    t += LEFT + 'Bill No : ' + header.billNo + LF;
    t += 'Date    : ' + header.date + LF + LINE;
    t += 'Customer: ' + header.customerName + LF;
    t += 'Mobile  : ' + header.mobile + LF;
    t += 'Payment : ' + header.paymentMethod + LF + LINE;
    const colIndexWidth = 2;
    const colItemWidth  = 16;
    const colQtyWidth   = 3;
    const colRateWidth  = 5;
    const colTotalWidth = 6;
    const hIndex = '#'.padEnd(colIndexWidth);
    const hItem  = 'Item'.padEnd(colItemWidth);
    const hQty   = centerText('Qty', colQtyWidth);
    const hRate  = 'Rate'.padStart(colRateWidth);
    const hTotal = 'Total'.padStart(colTotalWidth);
    
    t += hIndex + hItem + hQty + hRate + hTotal + '\n';
    
items.forEach((item, i) => {
  const it = item.qty * item.price;
  total += it;

  const fullName = item.name;

  const line1Name = fullName.substring(0, 16).padEnd(16);
  const line2Name = fullName.substring(16); // remaining text

  const qty  = centerText(item.qty, colQtyWidth); 
   const rateValue = Number(item.price).toString();   // 👈 fix
  const rate  = rateValue.padStart(colRateWidth);
  const tot  = String(it).padStart(colTotalWidth);

  // First line (with all columns)
  const index = (i+1 < 16) ? (i+1 + ' ') : (i+1);

t += index + line1Name + qty + rate + tot + '\n';

  // Second line (only if extra name exists)
  if (line2Name) {
    t += `   ${line2Name}\n`; // indent for alignment
  }
});
    
   const totalText = 'Total: Rs.' + total;
    t += LINE;
    t += totalText.padStart(32) + '\n';
    t += LINE + CENTER + 'Thank You! Visit Again' + LF;
    t += LF + LF + LF + CUT;
    return new TextEncoder().encode(t);
  }

  async function sendChunks(data) {
    for (let i = 0; i < data.length; i += 100) {
      await printChar.writeValue(data.slice(i, i+100));
      await new Promise(r => setTimeout(r, 50));
    }
  }
</script>
</body>
</html>
